<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bee Flower Bee (Co-op)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Mobile/Fullscreen Toggle -->
    <button id="mobile-btn">📱 Fullscreen</button>

    <!-- The Game Container -->
    <div id="game-container">
        <!-- The Screen (Fixed 960x720 Resolution) -->
        <div id="screen">
            
            <!-- HUD -->
            <div id="hud">
                <div id="player-info">
                    <div id="player-scores">
                        <div class="hud-item" id="p1-score">P1: 0</div>
                        <div class="hud-item hidden" id="p2-score">P2: 0</div>
                    </div>
                    <div id="gamepad-status" class="hud-item">
                        <span id="p1-gp-status">P1: GP?</span>
                        <span id="p2-gp-status" class="hidden">P2: GP?</span>
                    </div>
                </div>
                
                <div class="hud-item" id="level">LEVEL: 1</div>
                <div class="hud-item" id="flowers-left">🌼: 5</div>
                <div class="hud-item" id="timer">⏱️ 3:00</div>
                <div class="hud-item" id="lives">LIVES: 🐝🐝🐝</div>
                
                <!-- FPS Counter -->
                <div class="hud-item hidden" id="fps-counter">FPS: 60</div>
                
                <div id="dev-mode-indicator" class="hidden">DEV MODE</div>
            </div>
            
            <!-- Game World -->
            <div id="game-area">
                <div id="world">
                    <!-- Dynamic objects (Player, Clouds, Platforms) -->
                </div>
            </div>

            <!-- Menus & Overlays -->
            <div id="message-screen">
                <h1>Bee Flower Bee</h1>
                <p class="instructions">P1: WASD or Arrows to Move/Thrust</p>
                <p class="instructions">P2: Press Start/Join to play co-op!</p>
                <p class="instructions">Collect 🌼 | Avoid 🌵</p>
                <div class="button-container">
                    <button id="start-button">Start Game</button>
                    <button id="help-button">Settings / Help</button>
                </div>
            </div>

            <div id="level-message-screen" class="hidden"></div>

            <div id="help-screen" class="hidden">
                <h2>Settings</h2>
                
                <div class="settings-container">
                    <!-- Game Speed -->
                    <div class="settings-group">
                        <label>Game Speed:</label>
                        <select id="speed-select" class="retro-select">
                            <option value="0.75">0.75x</option>
                            <option value="1.0" selected>1.0x</option>
                            <option value="1.5">1.5x</option>
                            <option value="2.0">2.0x</option>
                        </select>
                    </div>

                    <!-- Audio Engine Section -->
                    <div class="settings-group audio-group">
                        <label>Audio Engine:</label>
                        <select id="audio-engine" class="retro-select">
                            <option value="buffered" selected>Pre-rendered (Fast)</option>
                            <option value="realtime">Real-time (Synth)</option>
                        </select>
                    </div>

                    <div class="settings-group audio-group">
                        <label>Latency Hint (Requires Reload):</label>
                        <select id="latency-hint" class="retro-select">
                            <option value="interactive" selected>Interactive (Low Latency)</option>
                            <option value="balanced">Balanced</option>
                            <option value="playback">Playback (Battery Saver)</option>
                        </select>
                    </div>

                    <!-- Volume -->
                    <div class="settings-group">
                        <label>Volume: <span id="volume-value">50%</span></label>
                        <input type="range" id="volume-slider" min="0" max="100" value="50">
                    </div>

                    <!-- Toggles -->
                    <div class="settings-group checkbox-group">
                        <label><input type="checkbox" id="toggle-fps"> Show FPS</label>
                        <label><input type="checkbox" id="lock-fps" checked> Lock 60FPS</label>
                    </div>
                </div>

                <div class="help-footer">
                    <div class="footer-buttons">
                        <button id="close-help-button">Resume</button>
                        <button id="restart-game-button" class="danger-btn">New Game</button>
                    </div>
                    <div id="game-version">v1.5</div>
                </div>
            </div>

            <!-- Help Button (In-Game) -->
            <div id="controls-bar">
                <button id="external-help-button">Settings (H)</button>
            </div>
        </div>
    </div>

    <!-- Mobile Touch Controls -->
    <div id="mobile-controls">
        <div id="mobile-dpad">
            <button id="mobile-left" class="mobile-control-btn">◀</button>
            <button id="mobile-right" class="mobile-control-btn">▶</button>
        </div>
        <div id="mobile-action">
            <button id="mobile-up" class="mobile-control-btn">▲</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
